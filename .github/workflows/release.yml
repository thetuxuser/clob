name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  build-wheel:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build hatchling
      - run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-binaries:
    needs: test

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: clob-linux-x64
            ext: ""

          - os: macos-latest
            artifact: clob-macos-x64
            ext: ""

          - os: windows-latest
            artifact: clob-windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e . pyinstaller

      - name: Build
        shell: bash
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact }} \
          --collect-all clob \
          --hidden-import pkg_resources \
          clob/main.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/crishacks/clob:latest
            ghcr.io/crishacks/clob:${{ github.ref_name }}

  pypi:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: build-wheel
    runs-on: ubuntu-latest

    environment:
      name: pypi

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Verify distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build-wheel, build-binaries, docker]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets

          # Move wheel and sdist
          find artifacts/dist -type f -exec cp {} release-assets/ \;

          # Move platform binaries
          find artifacts/clob-* -type f -exec cp {} release-assets/ \;

          ls -la release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body_path: CHANGELOG.md

  homebrew-bump:
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Compute tarball SHA256
        id: sha
        shell: bash
        run: |
          URL="https://github.com/crishacks/clob/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: crishacks/homebrew-tap
          event-type: bump-clob
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}"
            }
